<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arredondamento de Valores</title>
    <script>
        function processValues() {
            const value1 = parseFloat(document.getElementById('value1').value);
            const value2 = parseFloat(document.getElementById('value2').value);
            const value3 = parseFloat(document.getElementById('value3').value);

            const roundedValues = `
                <p>Valor 1: ${value1} - Math.round(): ${Math.round(value1)}, Math.ceil(): ${Math.ceil(value1)}, Math.floor(): ${Math.floor(value1)}</p>
                <p>Valor 2: ${value2} - Math.round(): ${Math.round(value2)}, Math.ceil(): ${Math.ceil(value2)}, Math.floor(): ${Math.floor(value2)}</p>
                <p>Valor 3: ${value3} - Math.round(): ${Math.round(value3)}, Math.ceil(): ${Math.ceil(value3)}, Math.floor(): ${Math.floor(value3)}</p>
            `;

            document.getElementById('result').innerHTML = roundedValues;
        }
    </script>
</head>
<body>
    <h1>Arredondamento de Valores</h1>
    <form onsubmit="event.preventDefault(); processValues();">
        <label for="value1">Valor 1:</label>
        <input type="number" id="value1" step="any" required><br><br>

        <label for="value2">Valor 2:</label>
        <input type="number" id="value2" step="any" required><br><br>

        <label for="value3">Valor 3:</label>
        <input type="number" id="value3" step="any" required><br><br>

        <button type="submit">Processar</button>
    </form>
    <div id="result"></div>
</body>
</html>
