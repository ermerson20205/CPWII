<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Concatenation</title>
</head>
<body>
    <script>
        const str1 = "Hello";
        const str2 = "World";
        const result = str1 + " " + str2;
        console.log(result); // Output: Hello World
    </script>
</body>
</html>
