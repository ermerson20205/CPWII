<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivinhe o Número</title>
</head>
<body>
    <h1>Adivinhe o Número</h1>
    
    <form id="formulario">
        <label for="numero">Digite um número (1 a 100):</label>
        <input type="number" id="numero" min="1" max="100" required>
        <button type="button" onclick="compararNumeros()">Enviar</button>
    </form>
    
    <div id="resultado"></div>

    <script>
        let numeroAleatorio = Math.floor(Math.random() * 100) + 1;
        console.log("Número aleatório gerado:", numeroAleatorio); // Para debug

        function compararNumeros() {
            const numero = parseInt(document.getElementById('numero').value);
            const resultado = document.getElementById('resultado');

            if (numero === numeroAleatorio) {
                resultado.innerHTML = `<h2>Parabéns! Você acertou! O número era ${numeroAleatorio}</h2>`;
            } else if (numero < numeroAleatorio) {
                resultado.innerHTML = `<h2>O número que você digitou (${numero}) é MENOR que o número gerado (${numeroAleatorio})</h2>`;
            } else {
                resultado.innerHTML = `<h2>O número que você digitou (${numero}) é MAIOR que o número gerado (${numeroAleatorio})</h2>`;
            }
        }
    </script>
</body>
</html>
