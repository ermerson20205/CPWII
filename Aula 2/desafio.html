<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 1</title>
</head>
<body>
    <p>Este é um exemplo de página HTML criada para a aula de CPWII.</p>
    <h1 id="Desafio">Alterar</h1>

    <!-- Controle de Tamanho -->
    <input type="range" id="tamanho" min="10" max="100" value="50" oninput="alterarEstilos()">
    <br>

    <!-- Controle de Cor -->
    <input type="color" id="cor" oninput="alterarEstilos()">
    <br>

    <!-- Opções de Fonte com IDs exclusivos -->
    <label><input type="radio" id="fonteArial" name="fonte" value="Arial" onchange="alterarEstilos()"> Arial</label>
    <label><input type="radio" id="fonteVerdana" name="fonte" value="Verdana" onchange="alterarEstilos()"> Verdana</label>
    <label><input type="radio" id="fonteCourierNew" name="fonte" value="Courier New" onchange="alterarEstilos()"> Courier New</label>
    <br>

    <!-- Botão -->
    <button onclick="saudarUsuario()">Enviar</button>

    <script>
        function alterarEstilos() {
            const tamanho = document.getElementById("tamanho").value;
            const cor = document.getElementById("cor").value;

            // Verificar qual botão de rádio está selecionado usando getElementById
            let fonte;
            if (document.getElementById("fonteArial").checked) {
                fonte = "Arial";
            } else if (document.getElementById("fonteVerdana").checked) {
                fonte = "Verdana";
            } else if (document.getElementById("fonteCourierNew").checked) {
                fonte = "Courier New";
            } else {
                fonte = "Arial"; // Fonte padrão caso nenhum botão esteja selecionado
            }

            const elemento = document.getElementById("Desafio");
            elemento.style.fontSize = tamanho + "px";
            elemento.style.color = cor;
            elemento.style.fontFamily = fonte;
        }

        function saudarUsuario() {
            alert("Estilos alterados com sucesso!");
        }
    </script>
</body>
</html>
