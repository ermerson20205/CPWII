<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6</title>
    <style>
        #css {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <p id="css">Este é um parágrafo com id="css".</p>
    <button onclick="alterarEstilo()">Alterar Estilo</button>

    <script>
        function alterarEstilo() {
            document.getElementById('css').style.fontSize = '55px';
        }
    </script>
</body>
</html></html>
