<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparação de Números</title>
    <script>
        function compararNumeros() {
            const numeroUsuario = parseInt(document.getElementById('numeroUsuario').value);
            const numeroAleatorio = Math.floor(Math.random() * 100) + 1; // Gera um número entre 1 e 100
            let resultado;

            if (numeroUsuario === numeroAleatorio) {
                resultado = `Parabéns! Você acertou. O número era ${numeroAleatorio}.`;
            } else {
                resultado = `Que pena! Você errou. O número gerado foi ${numeroAleatorio}.`;
            }

            document.getElementById('resultado').textContent = resultado;
        }
    </script>
</head>
<body>
    <h1>Jogo de Comparação de Números</h1>
    <form onsubmit="event.preventDefault(); compararNumeros();">
        <label for="numeroUsuario">Digite um número (1 a 100):</label>
        <input type="number" id="numeroUsuario" min="1" max="100" required>
        <button type="submit">Comparar</button>
    </form>
    <p id="resultado"></p>
</body>
</html>
