<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* Define o fundo padrão da página */
  body {
    background-color: lightgreen; /* Cor de fundo para telas grandes */
  }

  /* CSS responsivo: aplica estilos quando a largura é menor ou igual a 600px */
  @media only screen and (max-width: 600px) {
    body {
      background-color: lightblue; /* Cor de fundo para telas pequenas */
    }
  }
</style>
</head>
<body>
  <!-- Texto explicativo para entender o comportamento do layout -->
  <p>Redimensione a janela do navegador. 
     Quando a largura do documento for de 600 pixels ou menos, 
     a cor de fundo será "lightblue". Caso contrário, será "lightgreen".</p>
</body>
</html>
