<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
    <script>
        function gerarNumeroAleatorio() {
            const numeroAleatorio = Math.floor(Math.random() * 255) + 1;
            document.getElementById('resultado').textContent = `Número gerado: ${numeroAleatorio}`;
        }
    </script>
</head>
<body>
    <h1>Gerador de Número Aleatório</h1>
    <button onclick="gerarNumeroAleatorio()">Gerar Número</button>
    <p id="resultado"></p>
</body>
</html>
