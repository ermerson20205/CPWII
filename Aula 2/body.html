<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exemplo de Script no Body</title>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Este é um exemplo de script carregado no body.</p>

    <!-- Script JavaScript no body -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            alert('O conteúdo do body foi carregado!');
        });
    </script>
</body>
</html>
