<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Imagem</title>
    <style>
        img {
            max-width: 300px;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>Alterar Imagem com Botão</h1>
    <img id="imagem" src="imagem1.jpg" alt="Imagem inicial">
    <br>
    <button onclick="alterarImagem()">Alterar Imagem</button>

    <script>
        function alterarImagem() {
            const img = document.getElementById('imagem');
            img.src = img.src.includes('imagem1.jpg') ? 'imagem2.jpg' : 'imagem1.jpg';
        }
    </script>
</body>
</html>
