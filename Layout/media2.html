<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    /* Define o fundo padrão da página */
    body {
        background-color: lightgreen; /* Cor de fundo padrão */
    }

    /* Extra small devices (phones, 600px and down) */
    @media only screen and (max-width: 600px) {
        body {
            background-color: lightblue; /* Cor de fundo para dispositivos extra pequenos */
        }
    }

    /* Small devices (portrait tablets and large phones, 600px and up) */
    @media only screen and (min-width: 600px) {
        body {
            background-color: lightyellow; /* Cor de fundo para dispositivos pequenos */
        }
    }

    /* Medium devices (landscape tablets, 768px and up) */
    @media only screen and (min-width: 768px) {
        body {
            background-color: lightcoral; /* Cor de fundo para dispositivos médios */
        }
    }

    /* Large devices (laptops/desktops, 992px and up) */
    @media only screen and (min-width: 992px) {
        body {
            background-color: lightpink; /* Cor de fundo para dispositivos grandes */
        }
    }

    /* Extra large devices (large laptops and desktops, 1200px and up) */
    @media only screen and (min-width: 1200px) {
        body {
            background-color: lightgray; /* Cor de fundo para dispositivos extra grandes */
        }
    }
</style>
</head>
<body>
    <!-- Texto explicativo para entender o comportamento do layout -->
    <p>Redimensione a janela do navegador para observar as mudanças na cor de fundo 
         de acordo com o tamanho do dispositivo.</p>
</body>
</html>
