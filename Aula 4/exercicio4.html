<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparação de Valores</title>
    </head>
<body>
    <h1>Comparação de Valores</h1>
    <form id="comparisonForm">
        <label for="value1">Valor 1:</label>
        <input type="text" id="value1" name="value1" required>
        <br><br>
        <label for="value2">Valor 2:</label>
        <input type="text" id="value2" name="value2" required>
        <br><br>
        <button type="button" onclick="compareValues()">Comparar</button>
    </form>
    <div class="result" id="result"></div>

    <script>
        function compareValues() {
            const value1 = document.getElementById('value1').value;
            const value2 = document.getElementById('value2').value;

            const resultDiv = document.getElementById('result');
            let result = `
                Comparações:<br>
                ${value1} == ${value2}: ${value1 == value2}<br>
                ${value1} === ${value2}: ${value1 === value2}<br>
                ${value1} != ${value2}: ${value1 != value2}<br>
                ${value1} !== ${value2}: ${value1 !== value2}
            `;

            resultDiv.innerHTML = result;
        }
    </script>
</body>
</html>
