<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Substituir Vogais</title>
</head>
<body>
    <h1>Substituir Vogais por Asteriscos</h1>
    
    <label for="frase">Digite uma frase:</label>
    <input type="text" id="frase" placeholder="Escreva aqui...">
    <button onclick="substituirVogais()">Converter</button>
    
    <h2>Resultado:</h2>
    <p id="resultado"></p>
    
    <script>
        function substituirVogais() {
            const frase = document.getElementById('frase').value;
            const resultado = frase.replace(/[aeiouAEIOU]/g, '*');
            document.getElementById('resultado').textContent = resultado;
        }
    </script>
</body>
</html>
