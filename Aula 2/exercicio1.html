<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exemplo de Script no Head</title>
    <!-- Script JavaScript no head -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            alert('A página foi carregada!');
        });
    </script>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Este é um exemplo de script carregado no head.</p>
</body>
</html>
