<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Layout Responsivo à Orientação</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .container {
            display: flex;
            gap: 16px;
            padding: 24px;
            min-height: 100vh;
            box-sizing: border-box;
            transition: flex-direction 0.3s;
        }
        .item {
            flex: 1 1 0;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px #0001;
            padding: 32px;
            text-align: center;
            font-size: 1.2rem;
        }

        /* Retrato: elementos em linha (coluna) */
        @media (orientation: portrait) {
            .container {
                flex-direction: column;
            }
        }

        /* Paisagem: elementos em coluna (linha) */
        @media (orientation: landscape) {
            .container {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">Elemento 1</div>
        <div class="item">Elemento 2</div>
        <div class="item">Elemento 3</div>
    </div>
</body>
</html>
