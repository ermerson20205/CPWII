<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Sorteio Eletrônico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .section h2 {
            color: #667eea;
            font-size: 16px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        label {
            display: block;
            color: #555;
            font-weight: bold;
            margin-bottom: 5px;
            width: 100%;
        }

        input[type="number"] {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            flex: 1;
            min-width: 100px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .result-box {
            background: #e7f3ff;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            margin-top: 15px;
            display: none;
        }

        .result-box.show {
            display: block;
        }

        .result-box p {
            color: #333;
            font-size: 18px;
            font-weight: bold;
        }

        .number-display {
            font-size: 32px;
            color: #667eea;
            font-weight: bold;
            margin: 10px 0;
        }

        .check-result {
            margin-top: 10px;
            font-size: 16px;
            padding: 10px;
            border-radius: 5px;
        }

        .check-result.winner {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .check-result.loser {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .history {
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
            background: white;
            padding: 10px;
            border-radius: 5px;
        }

        .history-item {
            padding: 5px;
            font-size: 14px;
            color: #666;
            border-bottom: 1px solid #eee;
        }

        .error {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 Sorteio Eletrônico</h1>

        <div class="section">
            <h2>Configurar Sorteio</h2>
            <div class="input-group">
                <label>Número Mínimo:</label>
                <input type="number" id="minNum" placeholder="Ex: 1" value="1">
            </div>
            <div class="input-group">
                <label>Número Máximo:</label>
                <input type="number" id="maxNum" placeholder="Ex: 100" value="100">
            </div>
            <button onclick="iniciarSorteio()">🎲 Sortear Número</button>
            <div id="errorMsg" class="error"></div>
        </div>

        <div class="result-box" id="resultBox">
            <p>Número Sorteado:</p>
            <div class="number-display" id="numberDisplay">-</div>
            <div id="history" class="history"></div>
        </div>

        <div class="section">
            <h2>Verificar Número</h2>
            <div class="input-group">
                <label>Digite um número para verificar:</label>
                <input type="number" id="checkNum" placeholder="Ex: 42">
            </div>
            <button onclick="verificarNumero()">✓ Verificar</button>
            <div id="checkResult" class="check-result"></div>
        </div>
    </div>

    <script>
        let numeroSorteado = null;
        let historico = [];

        function iniciarSorteio() {
            const minNum = parseInt(document.getElementById('minNum').value);
            const maxNum = parseInt(document.getElementById('maxNum').value);
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = '';

            if (isNaN(minNum) || isNaN(maxNum)) {
                errorMsg.textContent = 'Por favor, preencha ambos os campos!';
                return;
            }

            if (minNum >= maxNum) {
                errorMsg.textContent = 'O número mínimo deve ser menor que o máximo!';
                return;
            }

            numeroSorteado = Math.floor(Math.random() * (maxNum - minNum + 1)) + minNum;
            
            historico.unshift(`${new Date().toLocaleTimeString()} - Sorteado: ${numeroSorteado} (${minNum} a ${maxNum})`);
            if (historico.length > 5) historico.pop();

            const resultBox = document.getElementById('resultBox');
            resultBox.classList.add('show');
            document.getElementById('numberDisplay').textContent = numeroSorteado;
            
            atualizarHistorico();
            limparVerificacao();
        }

        function verificarNumero() {
            const checkNum = parseInt(document.getElementById('checkNum').value);
            const checkResult = document.getElementById('checkResult');

            if (numeroSorteado === null) {
                checkResult.textContent = 'Por favor, sorteie um número primeiro!';
                checkResult.className = 'check-result loser';
                return;
            }

            if (isNaN(checkNum)) {
                checkResult.textContent = 'Digite um número válido!';
                checkResult.className = 'check-result loser';
                return;
            }

            if (checkNum === numeroSorteado) {
                checkResult.innerHTML = `🎉 Parabéns! O número ${checkNum} foi sorteado!`;
                checkResult.className = 'check-result winner';
            } else {
                checkResult.innerHTML = `❌ O número ${checkNum} não foi sorteado. Era ${numeroSorteado}`;
                checkResult.className = 'check-result loser';
            }
        }

        function atualizarHistorico() {
            const historyDiv = document.getElementById('history');
            historyDiv.innerHTML = '<strong>Últimos sorteios:</strong>';
            historico.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.textContent = item;
                historyDiv.appendChild(div);
            });
        }

        function limparVerificacao() {
            document.getElementById('checkNum').value = '';
            document.getElementById('checkResult').textContent = '';
            document.getElementById('checkResult').className = 'check-result';
        }
    </script>
</body>
</html>
