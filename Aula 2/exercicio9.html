<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 9</title>
    <script>
        function esconde() {
            document.getElementById('paragrafo').style.display = 'none';
        }
    </script>
</head>
<body>
    <p id="paragrafo">Este é o parágrafo que será ocultado ao clicar no botão.</p>
    <button onclick="esconde()">Ocultar Parágrafo</button>
</body>
</html>
