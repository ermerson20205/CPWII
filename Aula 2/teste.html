<!DOCTYPE html>
<html>
<body>

<h2>O que o JavaScript faz?</h2>

<p>JavaScript muda atributos e valores do HTML e CSS.</p>

<p id="demo" style="display:none">Hello JavaScript!</p>

<button type="button" onclick="document.getElementById('demo').style.fontSize='35px'">Aumenta!</button>


<button type="button" onclick="document.getElementById('demo').style.display='block'">Mostra!</button>

<button type="button"
onclick="document.getElementById('demo').style.display = 'none'">Esconde!</button>
<button onclick="window.print()">Print this page</button>

</body>
</html>
